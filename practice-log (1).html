<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Log — The Practice Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f5f0e8;
            --paper-dark: #ece4d0;
            --ink: #1a1510;
            --ink-light: #3d2e1e;
            --ink-muted: #7a6a56;
            --border: #c8b89a;
            --amber: #c8841a;
            --red: #8b2020;
            --blue: #1a3060;
            --green: #1a5c2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Libre Baskerville', serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 3rem; }

        .back-link {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--ink-muted);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }
        .back-link:hover { color: var(--amber); border-bottom-color: var(--amber); }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--ink-muted);
            letter-spacing: 0.04em;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amber), transparent);
            margin: 1.5rem auto;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            border: 2px solid var(--border);
            color: var(--ink-muted);
        }
        .empty-state-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--ink);
        }
        .empty-state p {
            font-size: 0.85rem;
            line-height: 1.7;
            font-style: italic;
        }
        .empty-state a {
            color: var(--amber);
            text-decoration: none;
            border-bottom: 1px solid var(--amber);
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 0;
            border: 2px solid var(--ink);
            margin-bottom: 2rem;
        }
        .stat {
            flex: 1;
            padding: 1rem;
            text-align: center;
            border-right: 1px solid var(--border);
        }
        .stat:last-child { border-right: none; }
        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 900;
            color: var(--ink);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-top: 0.25rem;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* Session entries */
        .entries { display: flex; flex-direction: column; gap: 0; }

        .entry {
            border: 2px solid var(--ink);
            border-bottom: none;
            overflow: hidden;
        }
        .entry:last-child { border-bottom: 2px solid var(--ink); }

        .entry-header {
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            gap: 1rem;
            transition: background 0.15s;
            user-select: none;
        }
        .entry-header:hover { background: var(--paper-dark); }

        .entry-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.75rem;
            font-style: italic;
            color: var(--ink-muted);
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        .entry-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            flex: 1;
        }

        .entry-meta {
            font-size: 0.72rem;
            color: var(--ink-muted);
            display: flex;
            gap: 0.75rem;
            white-space: nowrap;
            align-items: center;
        }

        .entry-chevron {
            font-size: 0.7rem;
            color: var(--border);
            transition: transform 0.2s;
        }
        .entry.open .entry-chevron { transform: rotate(90deg); }

        .entry-body {
            display: none;
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            background: var(--paper-dark);
        }
        .entry.open .entry-body { display: block; }

        .entry-steps { margin-bottom: 0.75rem; }

        .entry-step {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.35rem 0;
            border-bottom: 1px solid rgba(200,184,154,0.4);
            font-size: 0.82rem;
        }
        .entry-step:last-child { border-bottom: none; }

        .entry-step-name { color: var(--ink-light); flex: 1; }
        .entry-step-times {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.8rem;
            color: var(--ink-muted);
            display: flex;
            gap: 0.5rem;
        }
        .entry-step-actual { color: var(--ink); font-weight: 600; }

        .entry-total {
            display: flex;
            justify-content: space-between;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--border);
            background: var(--paper);
            color: var(--ink-muted);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.72rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            letter-spacing: 0.04em;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

        .clear-btn {
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--red);
            background: none;
            color: var(--red);
            font-family: 'Libre Baskerville', serif;
            font-size: 0.72rem;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
            margin-left: auto;
            opacity: 0.6;
        }
        .clear-btn:hover { opacity: 1; background: var(--red); color: var(--paper); }

        @media (max-width: 600px) {
            body { padding: 1.25rem; }
            .stats-bar { flex-direction: column; }
            .stat { border-right: none; border-bottom: 1px solid var(--border); }
            .stat:last-child { border-bottom: none; }
            .entry-meta { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="https://grdallas.github.io/Practice-Session-Generator/" class="back-link">← Session Generator</a>
        <h1 class="title">Practice Log</h1>
        <p class="subtitle">your practice history</p>
        <div class="divider"></div>
    </div>

    <div id="statsBar" class="stats-bar" style="display:none;">
        <div class="stat">
            <div class="stat-number" id="statSessions">0</div>
            <div class="stat-label">Sessions</div>
        </div>
        <div class="stat">
            <div class="stat-number" id="statStreak">0</div>
            <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat">
            <div class="stat-number" id="statInstrument">—</div>
            <div class="stat-label">Top Instrument</div>
        </div>
    </div>

    <div class="filters" id="filters" style="display:none;">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" data-filter="week" onclick="setFilter('week', this)">This Week</button>
        <button class="filter-btn" data-filter="month" onclick="setFilter('month', this)">This Month</button>
        <button class="clear-btn" onclick="clearLog()">Clear Log</button>
    </div>

    <div id="content"></div>
</div>

<script>
    let allEntries = [];
    let currentFilter = 'all';

    function loadLog() {
        try {
            allEntries = JSON.parse(localStorage.getItem('practiceLog') || '[]');
        } catch(e) {
            allEntries = [];
        }
        render();
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function getFilteredEntries() {
        if (currentFilter === 'all') return allEntries;
        const now = new Date();
        const cutoff = new Date();
        if (currentFilter === 'week') cutoff.setDate(now.getDate() - 7);
        if (currentFilter === 'month') cutoff.setMonth(now.getMonth() - 1);
        return allEntries.filter(e => new Date(e.date) >= cutoff);
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function calcStreak() {
        if (!allEntries.length) return 0;
        const dates = [...new Set(allEntries.map(e => new Date(e.date).toDateString()))];
        let streak = 0;
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        if (!dates.includes(today) && !dates.includes(yesterday)) return 0;
        let check = dates.includes(today) ? new Date() : new Date(Date.now() - 86400000);
        while (true) {
            if (dates.includes(check.toDateString())) {
                streak++;
                check = new Date(check.getTime() - 86400000);
            } else break;
        }
        return streak;
    }

    function topInstrument() {
        if (!allEntries.length) return '—';
        const counts = {};
        allEntries.forEach(e => { if (e.instrument) counts[e.instrument] = (counts[e.instrument] || 0) + 1; });
        return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';
    }

    function render() {
        const entries = getFilteredEntries();
        const content = document.getElementById('content');

        if (!allEntries.length) {
            document.getElementById('statsBar').style.display = 'none';
            document.getElementById('filters').style.display = 'none';
            content.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-title">No sessions logged yet</div>
                    <p>Complete a practice session and click <em>Save to Log</em>, or finish a session with the timer running.<br><br>
                    <a href="index.html">← Start a session</a></p>
                </div>`;
            return;
        }

        // Stats
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('filters').style.display = 'flex';
        document.getElementById('statSessions').textContent = allEntries.length;
        document.getElementById('statStreak').textContent = calcStreak();
        document.getElementById('statInstrument').textContent = topInstrument().charAt(0).toUpperCase() + topInstrument().slice(1);

        if (!entries.length) {
            content.innerHTML = `<div class="empty-state"><div class="empty-state-title">No sessions in this period</div><p>Try a different filter.</p></div>`;
            return;
        }

        // Group by date
        const groups = {};
        entries.forEach(e => {
            const dateKey = new Date(e.date).toDateString();
            if (!groups[dateKey]) groups[dateKey] = [];
            groups[dateKey].push(e);
        });

        let html = '<div class="entries">';
        Object.entries(groups).forEach(([dateKey, dayEntries]) => {
            dayEntries.forEach((entry, idx) => {
                const time = new Date(entry.date).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                const stepsHtml = (entry.steps || []).map(step => `
                    <div class="entry-step">
                        <span class="entry-step-name">${step.name}</span>
                        <span class="entry-step-times">
                            <span>${step.planned}</span>
                            ${step.actual !== '—' ? `<span>→</span><span class="entry-step-actual">${step.actual}</span>` : ''}
                        </span>
                    </div>`).join('');

                html += `
                <div class="entry" id="entry-${entry.id}">
                    <div class="entry-header" onclick="toggleEntry('entry-${entry.id}')">
                        <span class="entry-date">${formatDate(entry.date)} · ${time}</span>
                        <span class="entry-title">${entry.title}</span>
                        <span class="entry-meta">
                            ${entry.instrument ? `<span>${entry.instrument}</span>` : ''}
                            ${entry.totalTime !== '—' ? `<span>${entry.totalTime}</span>` : ''}
                        </span>
                        <span class="entry-chevron">›</span>
                    </div>
                    <div class="entry-body">
                        <div class="entry-steps">${stepsHtml}</div>
                        ${entry.totalTime !== '—' ? `
                        <div class="entry-total">
                            <span>Total Time</span>
                            <span>${entry.totalTime}</span>
                        </div>` : ''}
                    </div>
                </div>`;
            });
        });
        html += '</div>';
        content.innerHTML = html;
    }

    function toggleEntry(id) {
        document.getElementById(id)?.classList.toggle('open');
    }

    function clearLog() {
        if (confirm('Clear your entire practice log? This cannot be undone.')) {
            localStorage.removeItem('practiceLog');
            allEntries = [];
            render();
        }
    }

    loadLog();
</script>
</body>
</html>
